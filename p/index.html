<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<title>For Miuu ✨</title>

<style>

body{
margin:0;
height:100vh;
background:radial-gradient(circle at bottom,#0d0d2b,#000);
font-family:'Segoe UI',sans-serif;
overflow:hidden;
color:white;
display:flex;
align-items:center;
justify-content:center;
}

/* animated stars */

.stars{
position:absolute;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
animation:starsMove 60s linear infinite;
opacity:0.6;
}

@keyframes starsMove{
from{background-position:0 0;}
to{background-position:2000px 2000px;}
}

/* main card */

.card{
position:relative;
background:rgba(0,0,0,0.55);
padding:60px;
border-radius:25px;
text-align:center;
backdrop-filter:blur(15px);
box-shadow:0 0 60px rgba(255,0,120,0.35);
z-index:10;
max-width:500px;
}

/* title */

.title{
font-size:42px;
background:linear-gradient(45deg,#ff4b7d,#ff9a9e);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-shadow:0 0 15px rgba(255,75,125,0.6);
margin-bottom:25px;
}

/* typing text */

#typing{
font-size:18px;
line-height:1.6;
min-height:70px;
opacity:0.9;
}

/* button */

button{
margin-top:25px;
padding:12px 28px;
border:none;
background:linear-gradient(45deg,#ff4b7d,#ff0055);
color:white;
border-radius:30px;
font-size:16px;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 15px rgba(255,0,100,0.5);
}

button:hover{
transform:scale(1.1);
}

/* glowing MIUU */

.miuu{
position:absolute;
bottom:40px;
font-size:48px;
font-weight:600;
color:#ff4b7d;
text-shadow:0 0 20px #ff4b7d,0 0 40px #ff4b7d;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.15)}
100%{transform:scale(1)}
}

/* floating hearts */

.heart{
position:absolute;
color:#ff4b7d;
font-size:20px;
animation:floatUp 7s linear infinite;
}

@keyframes floatUp{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-110vh);opacity:0}
}

/* rose petals */

.rose{
position:absolute;
font-size:24px;
animation:fallDown 9s linear infinite;
}

@keyframes fallDown{
0%{transform:translateY(-40px) rotate(0deg)}
100%{transform:translateY(110vh) rotate(360deg)}
}

/* 3D heart */

.heart3d{
position:absolute;
top:60px;
width:80px;
height:80px;
background:#ff2e63;
transform:rotate(-45deg);
animation:beat 1s infinite;
box-shadow:0 0 25px #ff2e63;
}

.heart3d:before,
.heart3d:after{
content:"";
position:absolute;
width:80px;
height:80px;
background:#ff2e63;
border-radius:50%;
}

.heart3d:before{top:-40px;}
.heart3d:after{left:40px;}

@keyframes beat{
0%{transform:scale(1) rotate(-45deg)}
50%{transform:scale(1.2) rotate(-45deg)}
100%{transform:scale(1) rotate(-45deg)}
}

</style>

</head>

<body>

<div class="stars"></div>

<div class="card">

<div class="title">Hey Miuu ✨</div>

<p id="typing"></p>

<button onclick="showMessage()">Click for a small surprise 💌</button>

<p id="message"></p>

</div>

<div class="heart3d"></div>

<div class="miuu">MIUU ✨</div>

<script>

/* typing */

const text="Hi Miuu, I just made this little page for fun. Hope it brings a small smile to your day ✨";

let i=0;

function typing(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(typing,45);
}
}

typing();

/* message */

function showMessage(){

document.getElementById("message").innerHTML=
"English: Hope you have a beautiful day today ✨ <br><br> Español: Espero que hoy tengas un día muy bonito 💫";

}

/* floating hearts */

setInterval(()=>{

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";
heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),7000);

},400);

/* rose petals */

setInterval(()=>{

let rose=document.createElement("div");
rose.className="rose";
rose.innerHTML="🌸";
rose.style.left=Math.random()*100+"vw";

document.body.appendChild(rose);

setTimeout(()=>rose.remove(),9000);

},900);

/* mouse sparkle */

document.addEventListener("mousemove",e=>{

let sparkle=document.createElement("div");

sparkle.innerHTML="✨";
sparkle.style.position="absolute";
sparkle.style.left=e.pageX+"px";
sparkle.style.top=e.pageY+"px";

document.body.appendChild(sparkle);

setTimeout(()=>sparkle.remove(),800);

});

</script>

</body>
</html>
