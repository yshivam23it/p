<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Miuu</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>

body{
margin:0;
overflow:hidden;
font-family:'Poppins',sans-serif;
background:black;
color:white;
}

/* intro */

.intro{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
font-family:'Orbitron';
font-size:55px;
letter-spacing:5px;
background:black;
animation:introFade 4s forwards;
z-index:5;
}

@keyframes introFade{
0%{opacity:1}
100%{opacity:0;visibility:hidden}
}

/* content */

.content{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:2;
}

/* title */

.title{
font-family:'Orbitron';
font-size:48px;
background:linear-gradient(45deg,#ff4b7d,#7b5cff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* text */

.msg{
margin-top:20px;
font-size:18px;
opacity:0.9;
line-height:1.6;
}

/* button */

button{
margin-top:25px;
padding:12px 30px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ff4b7d,#ff0055);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

/* MIUU */

.miuu{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
font-family:'Orbitron';
font-size:42px;
letter-spacing:12px;
color:#ff4b7d;
text-shadow:0 0 20px #ff4b7d;
}

canvas{
position:absolute;
top:0;
left:0;
}

</style>

</head>

<body>

<div class="intro">
HELLO MIUU ✨
</div>

<div class="content">

<div class="title">A Little Cosmic Message</div>

<div class="msg" id="typing"></div>

<button onclick="openMessage()">Open Message 💌</button>

<div class="msg" id="message"></div>

</div>

<div class="miuu">M I U U</div>

<script>

/* typing */

const text="Hi Miuu, I made this small cosmic page while learning some creative coding. Just thought it might bring a little smile to your day ✨";

let i=0;

function typing(){

if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(typing,40);
}

}

typing();

/* message */

function openMessage(){

document.getElementById("message").innerHTML=
"English: Hope your day is going well and something nice happens today ✨ <br><br> Español: Espero que tengas un día bonito y que algo bueno te haga sonreír 💫";

}

/* Three.js galaxy */

const scene=new THREE.Scene();

const camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer=new THREE.WebGLRenderer({alpha:true});

renderer.setSize(window.innerWidth,window.innerHeight);

document.body.appendChild(renderer.domElement);

camera.position.z=5;

const starGeometry=new THREE.BufferGeometry();

const starCount=2500;

const positions=new Float32Array(starCount*3);

for(let i=0;i<starCount*3;i++){

positions[i]=(Math.random()-0.5)*700;

}

starGeometry.setAttribute(
'position',
new THREE.BufferAttribute(positions,3)
);

const starMaterial=new THREE.PointsMaterial({
color:0xffffff,
size:0.8
});

const stars=new THREE.Points(starGeometry,starMaterial);

scene.add(stars);

function animate(){

requestAnimationFrame(animate);

stars.rotation.y+=0.0005;

renderer.render(scene,camera);

}

animate();

/* meteor shower */

setInterval(()=>{

let meteor=document.createElement("div");

meteor.innerHTML="🌠";

meteor.style.position="absolute";
meteor.style.left=Math.random()*window.innerWidth+"px";
meteor.style.top="0px";
meteor.style.fontSize="24px";

document.body.appendChild(meteor);

let fall=setInterval(()=>{

meteor.style.top=parseInt(meteor.style.top)+10+"px";
meteor.style.left=parseInt(meteor.style.left)+5+"px";

},30)

setTimeout(()=>{
clearInterval(fall)
meteor.remove()
},2000)

},3000);

</script>

</body>
</html>
